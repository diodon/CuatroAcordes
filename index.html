<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analizador de Acordes — Cuatro Venezolano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── Variables ─────────────────────────────────────── */
:root {
  --bg:           #eef2f8;
  --bg2:          #e2eaf5;
  --bg3:          #d4e0f0;
  --surface:      #f5f8fd;
  --border:       #9ab4d8;
  --border-light: #bdd0e8;
  --text:         #0d1f3c;
  --text2:        #1a3868;
  --text3:        #3a5a90;
  --accent:       #1a5bbf;
  --accent2:      #2e72d4;
  --accent-light: #dce8f8;
  --gold:         #2e72d4;
  --gold-light:   #dce8f8;
  --green:        #1a7a5e;
  --radius:       8px;
  --shadow:       0 2px 12px rgba(13,31,60,0.12);
  --shadow-lg:    0 8px 32px rgba(13,31,60,0.18);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Lato', sans-serif;
  --font-mono:    'IBM Plex Mono', monospace;
}
[data-theme="dark"] {
  --bg:           #1a2540;
  --bg2:          #223055;
  --bg3:          #2a3a65;
  --surface:      #1e2e50;
  --border:       #3a5888;
  --border-light: #2e4870;
  --text:         #e8f4ff;
  --text2:        #b8d4f0;
  --text3:        #90b0d8;
  --accent:       #6ab4ff;
  --accent2:      #88c8ff;
  --accent-light: #1e3460;
  --gold:         #6ab4ff;
  --gold-light:   #182848;
  --green:        #50d8a8;
  --shadow:       0 2px 12px rgba(0,0,0,0.3);
  --shadow-lg:    0 8px 32px rgba(0,0,0,0.4);
}

/* ── Reset & Base ──────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  font-weight: 400;
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}
button {
  cursor: pointer;
  font-family: var(--font-body);
  border: none;
  background: none;
}
select, input {
  font-family: var(--font-body);
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  font-size: 15px;
  font-weight: 400;
  transition: border-color 0.2s;
}
select:focus, input:focus { outline: none; border-color: var(--accent); }

/* ── Layout ────────────────────────────────────────── */
.app-shell {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* ── Header ────────────────────────────────────────── */
header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding: 28px 0 20px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 32px;
  flex-wrap: nowrap;
  gap: 12px;
}
.header-title {
  flex-shrink: 1;
  min-width: 0;
}
.header-title h1 {
  font-family: var(--font-display);
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.header-title h2 {
  font-family: var(--font-display);
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  font-weight: 400;
  font-style: italic;
  color: var(--text3);
  margin-top: 2px;
}
.header-controls {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex-wrap: nowrap;
  flex-shrink: 0;
}
#btnNotacion {
  min-width: 72px;
  justify-content: center;
}
.btn-theme {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 20px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 13px;
  font-weight: 700;
  transition: all 0.2s;
}
.btn-theme:hover { background: var(--bg3); color: var(--text); }
.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  transition: all 0.2s;
  cursor: pointer;
}
.btn-icon:hover { background: var(--bg3); color: var(--accent); }
.btn-escala {
  height: 33px;
  width: 33px;
  flex-shrink: 0;
  border-radius: 8px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-escala:hover { background: var(--bg3); color: var(--accent); }
.btn-escala.menor { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }

/* ── Section ───────────────────────────────────────── */
section {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}
.section-title {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title svg { color: var(--accent); flex-shrink: 0; }

/* ── Transposition Panel ───────────────────────────── */
.trans-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  align-items: end;
}
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
}
.interval-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--gold-light);
  border: 1px solid var(--gold);
  border-radius: 20px;
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--gold);
  font-size: 15px;
  white-space: nowrap;
}
select { width: 100%; }

/* ── Chord Table ───────────────────────────────────── */
.table-wrapper { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 15px;
}
thead th {
  background: var(--bg2);
  color: var(--text2);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  padding: 9px 10px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
tbody tr {
  border-bottom: 1px solid var(--border-light);
  transition: background 0.15s;
}
tbody tr:hover { background: var(--bg2); }
td {
  padding: 9px 10px;
  vertical-align: middle;
}
td:first-child {
  color: var(--text2);
  font-size: 13px;
  font-weight: 700;
  width: 28px;
}
.td-roman {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 15px;
  color: var(--accent);
  font-weight: 700;
}
.td-chord {
  font-weight: 700;
  font-size: 15px;
}
.td-trans {
  color: var(--green);
  font-weight: 700;
  font-size: 15px;
}
.td-fing {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text);
  letter-spacing: 2px;
}
.td-fing-trans {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--green);
  letter-spacing: 2px;
}
.td-notes input {
  width: 100%;
  min-width: 90px;
  padding: 4px 8px;
  font-size: 14px;
  border-radius: 5px;
}
.btn-del {
  color: var(--text3);
  font-size: 16px;
  padding: 4px 8px;
  border-radius: 5px;
  transition: all 0.15s;
}
.btn-del:hover { color: var(--accent); background: var(--accent-light); }
.table-footer {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.btn-add {
  padding: 8px 18px;
  background: var(--accent);
  color: white;
  border-radius: 20px;
  font-weight: 700;
  font-size: 13px;
  transition: all 0.2s;
}
.btn-add:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-clear {
  padding: 8px 18px;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  border-radius: 20px;
  font-weight: 700;
  font-size: 13px;
  transition: all 0.2s;
}
.btn-clear:hover { background: var(--bg3); }

/* ── Diagrams ──────────────────────────────────────── */
.diagrams-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 600px) { .diagrams-wrap { grid-template-columns: 1fr; } }
.diagram-col-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px dashed var(--border-light);
}
.diagrams-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}
.diagram-card {
  background: var(--bg2);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
}
.diagram-name {
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 8px;
  color: var(--text);
}
.diagram-fing {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text3);
  margin-top: 5px;
  letter-spacing: 2px;
}
svg.fret-svg { display: block; margin: 0 auto; }

/* ── Progression ───────────────────────────────────── */
.prog-row {
  display: flex;
  align-items: flex-start;
  gap: 18px;
  flex-wrap: wrap;
}
.prog-degrees {
  flex: 1;
  min-width: 160px;
}
.prog-degrees-label {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.7px;
  color: var(--text2);
  margin-bottom: 6px;
}
.degrees-display {
  font-family: var(--font-display);
  font-style: italic;
  font-size: 1.4rem;
  color: var(--accent);
  font-weight: 700;
  min-height: 2rem;
  letter-spacing: 1px;
}
.prog-match {
  flex: 2;
  min-width: 200px;
}
.prog-match-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
  background: rgba(45,106,79,0.1);
  border: 1px solid rgba(45,106,79,0.3);
  border-radius: 20px;
  padding: 6px 16px;
  display: inline-block;
  margin-top: 20px;
}
.prog-none {
  color: var(--text2);
  font-style: italic;
  font-size: 14px;
  margin-top: 20px;
}

/* ── Loading ───────────────────────────────────────── */
#loading {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  gap: 16px;
  transition: opacity 0.4s;
}
#loading h2 {
  font-family: var(--font-display);
  color: var(--accent);
  font-size: 1.5rem;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Chord Popup ───────────────────────────────────── */
.td-chord-link, .td-trans-link {
  cursor: pointer;
  text-decoration: underline dotted;
  text-underline-offset: 3px;
  transition: opacity 0.15s;
}
.td-chord-link:hover, .td-trans-link:hover { opacity: 0.7; }
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 32px 24px;
  box-shadow: var(--shadow-lg);
  position: relative;
  text-align: center;
  min-width: 160px;
}
.modal-close {
  position: absolute;
  top: 10px;
  right: 12px;
  font-size: 18px;
  color: var(--text3);
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 5px;
  transition: all 0.15s;
}
.modal-close:hover { color: var(--accent); background: var(--accent-light); }
.modal-chord-name {
  font-family: var(--font-body);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 14px;
}
.modal-fing {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text3);
  margin-top: 8px;
  letter-spacing: 2px;
}

/* ── All-qualities Modal ───────────────────────────── */
.modal-all-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px 24px;
  box-shadow: var(--shadow-lg);
  position: relative;
  max-width: 90vw;
  max-height: 85vh;
  overflow-y: auto;
  width: 720px;
}
.modal-all-title {
  font-family: var(--font-body);
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 20px;
  text-align: center;
}
.modal-all-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 12px;
}
.header-acorde-sel {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.header-acorde-sel .field-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text3);
}

/* ── Help Modal ────────────────────────────────────── */
.modal-help-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow-lg);
  position: relative;
  max-width: 92vw;
  max-height: 88vh;
  width: 800px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.help-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border-light);
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}
.help-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.help-nav {
  display: flex;
  flex-direction: column;
  width: 170px;
  flex-shrink: 0;
  border-right: 1px solid var(--border-light);
  padding: 12px 8px;
  gap: 4px;
  overflow-y: auto;
}
.help-tab {
  text-align: left;
  padding: 9px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.help-tab:hover { background: var(--bg2); color: var(--text); }
.help-tab.active { background: var(--accent-light); color: var(--accent); font-weight: 700; }
.help-content {
  flex: 1;
  padding: 24px 28px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}
.help-content h3 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
}
.help-content p { margin-bottom: 10px; }
.help-content ul { padding-left: 18px; margin-bottom: 10px; }
.help-content li { margin-bottom: 6px; }
.help-content strong { color: var(--text); }
.help-content .help-badge {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 5px;
  padding: 1px 7px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 700;
}
@media (max-width: 560px) {
  .help-nav { width: 120px; }
  .help-tab { font-size: 12px; padding: 8px 10px; }
  .help-content { padding: 16px; }
}

/* ── Responsive ────────────────────────────────────── */
#selProgresion { max-width: 180px; }

@media (max-width: 768px) {
  section { padding: 18px 14px; }
  .trans-grid { grid-template-columns: 1fr 1fr; }
  thead th:nth-child(8), thead th:nth-child(9),
  td:nth-child(8), td:nth-child(9) { display: none; }
}
@media (max-width: 520px) {
  header { flex-wrap: wrap; align-items: flex-start; }
  .header-title { flex: 1 1 100%; }
  .header-controls {
    flex-wrap: wrap;
    width: 100%;
    justify-content: flex-end;
    gap: 8px;
  }
  .header-acorde-sel { flex-shrink: 1; }
  #selProgresion { max-width: 130px; }
  #selAcordeRef  { max-width: 110px; }
  #btnNotacion   { min-width: 60px; font-size: 12px; padding: 6px 10px; }
}
@media (max-width: 480px) {
  .trans-grid { grid-template-columns: 1fr; }
  thead th:nth-child(7), td:nth-child(7) { display: none; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>Cargando acordes…</h2>
</div>

<div class="app-shell" id="app" style="display:none">

  <!-- Header -->
  <header>
    <div class="header-title">
      <h1 id="titulo"></h1>
      <h2 id="subtitulo"></h2>
    </div>
    <div class="header-controls">
      <div class="header-acorde-sel">
        <span class="field-label">Progresiones</span>
        <div style="display:flex;gap:5px;align-items:flex-end">
          <select id="selProgresion" onchange="aplicarProgresion(this.value);this.value=''">
            <option value="">— Seleccionar —</option>
          </select>
          <button id="btnEscala" class="btn-escala" onclick="toggleEscala()" title="Mayor / Menor">M</button>
        </div>
      </div>
      <div class="header-acorde-sel">
        <span class="field-label">Acordes</span>
        <select id="selAcordeRef" onchange="mostrarTodosAcordes(this.value);this.value=''">
          <option value="">— Seleccionar —</option>
        </select>
      </div>
      <button class="btn-theme" id="btnNotacion" onclick="toggleNotacion()">
        <span id="btnNotacionLabel">C D E</span>
      </button>
      <button class="btn-icon" onclick="abrirHelp()" title="Ayuda">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="3"/></svg>
      </button>
      <button class="btn-icon" id="btnTema" onclick="toggleTema()" title="Cambiar tema">
        <svg id="iconSol" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg id="iconLuna" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Transposición -->
  <section>
    <div class="section-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span id="tituloTrans"></span>
    </div>
    <div class="trans-grid">
      <div class="field-group">
        <span class="field-label" id="labelOrigen"></span>
        <select id="selOrigen" onchange="actualizar()"></select>
      </div>
      <div class="field-group">
        <span class="field-label" id="labelDestino"></span>
        <select id="selDestino" onchange="actualizar()"></select>
      </div>
      <div class="field-group">
        <span class="field-label" id="labelIntervalo"></span>
        <div class="interval-badge">
          <span id="semitones">0</span>
          <span id="labelSemitonos" style="font-family:var(--font-body);font-size:12px;font-weight:400"></span>
        </div>
      </div>
      <div class="field-group">
        <span class="field-label" id="labelModo"></span>

function construirSelects() {
  const notas = CFG.notas.sostenidos;
  ['selOrigen','selDestino'].forEach(id => {
    const sel = document.getElementById(id);
    notas.forEach(n => {
      const o = document.createElement('option');
      o.value = n;
      o.textContent = displayNota(n);
      sel.appendChild(o);
    });
  });
  // Default: C origin, G destination
  document.getElementById('selOrigen').value = 'C';
  document.getElementById('selDestino').value = 'G';
}

function refrescarSelectsNota() {
  const notas = CFG.notas.sostenidos;
  ['selOrigen','selDestino'].forEach(id => {
    const sel = document.getElementById(id);
    Array.from(sel.options).forEach((opt, i) => {
      opt.textContent = displayNota(notas[i]);
    });
  });
}

function construirCabecera() {
  const ui = CFG.ui;
  const cols = [
    ui.col_num, ui.col_nota, ui.col_calidad, ui.col_acorde,
    ui.col_grado, ui.col_transpuesto,
    ui.col_digitacion_orig, ui.col_digitacion_trans,
    ui.col_notas, ''
  ];
  const tr = document.getElementById('cabeceraRow');
  cols.forEach(c => {
    const th = document.createElement('th');
    th.textContent = c;
    tr.appendChild(th);
  });
}

// ── Music Engine ──────────────────────────────────────────────────────────────
const STRING_BASES = [11, 6, 2, 9]; // B, F#, D, A

function notaANum(nota) {
  const idx = CFG.notas.sostenidos.indexOf(nota);
  if (idx >= 0) return idx;
  return CFG.notas.bemoles.indexOf(nota);
}

function numANota(num, modo) {
  num = ((num % 12) + 12) % 12;
  return modo === 'flat' ? CFG.notas.bemoles[num] : CFG.notas.sostenidos[num];
}

function nombreAcorde(nota, calidad) {
  const q = CFG.calidades[calidad];
  if (!q) return nota;
  return nota + q.simbolo;
}

function displayNota(nota) {
  if (notacion === 'latin') return CFG.notas.nombres_display[nota] || nota;
  return nota;
}

function displayAcorde(nota, calidad) {
  const q = CFG.calidades[calidad];
  return displayNota(nota) + (q ? q.simbolo : '');
}

function calcularGrado(raizNum, tonalidadNum) {
  const semis = ((raizNum - tonalidadNum) % 12 + 12) % 12;
  const entrada = CFG.grados_romanos[String(semis)];
  if (!entrada) return '?';
  const q = CFG.calidades[filas[0]?.calidad] || {};
  return entrada.mayor; // simplified: always show major degree form
}

function calcularDigitacion(raizNum, calidad) {
  const q = CFG.calidades[calidad];
  if (!q) return [0,0,0,0];
  const intervalos = q.intervalos;
  const notasAcorde = new Set(intervalos.map(i => ((raizNum + i) % 12 + 12) % 12));

  // Check overrides first
  const notaNombre = CFG.notas.sostenidos[raizNum];
  const nombreChord = nombreAcorde(notaNombre, calidad);
  const override = CFG.digitaciones_override[nombreChord];
  if (override) return override;
  // Also check flat name
  const notaNombreB = CFG.notas.bemoles[raizNum];
  const nombreChordB = nombreAcorde(notaNombreB, calidad);
  const overrideB = CFG.digitaciones_override[nombreChordB];
  if (overrideB) return overrideB;

  const w = CFG.algoritmo.pesos;

  // Generate all valid fingering combos
  const opciones = STRING_BASES.map(base =>
    Array.from({length: 10}, (_, f) => f).filter(f => notasAcorde.has((base + f) % 12))
  );
  // Fallback open string if no option
  opciones.forEach((op, s) => { if (op.length === 0) op.push(0); });

  let mejor = null, mejorPuntuacion = Infinity;

  function iterar(s, combo) {
    if (s === 4) {
      const cubiertos = new Set(STRING_BASES.map((b, i) => (b + combo[i]) % 12));
      if (!cubiertos.has(raizNum % 12)) return;
      const faltantes = [...notasAcorde].filter(n => !cubiertos.has(n)).length;
      const presionados = combo.filter(f => f > 0);
      const distinto = new Set(presionados).size;
      const fspan = presionados.length > 0 ? Math.max(...presionados) - Math.min(...presionados) : 0;
      const fp = combo.map((f,i) => f > 0 ? i : -1).filter(i => i >= 0);
      const op = combo.map((f,i) => f === 0 ? i : -1).filter(i => i >= 0);
      const guia  = op.filter(i => fp.length === 0 || i < fp[0]).length;
      const arrastre = op.filter(i => fp.length === 0 || i > fp[fp.length-1]).length;
      const medio = op.filter(i => fp.length > 0 && i > fp[0] && i < fp[fp.length-1]).length;
      const minTraste = presionados.length > 0 ? Math.min(...presionados) : 0;
      const barrePuro = (presionados.length > 0 && new Set(presionados).size === 1) ? presionados[0] : 0;
      const mx = Math.max(...combo);
      const sm = combo.reduce((a,b)=>a+b,0);
      const puntuacion = faltantes * w.nota_faltante
        + distinto * w.distintas
        + guia * minTraste * w.escala_guia
        + arrastre * w.arrastre
        + medio * w.medio
        + barrePuro * w.barre_puro
        + fspan * w.amplitud
        + mx * w.maximo
        + sm;
      if (puntuacion < mejorPuntuacion) {
        mejorPuntuacion = puntuacion;
        mejor = [...combo];
      }
      return;
    }
    for (const f of opciones[s]) {
      combo[s] = f;
      iterar(s + 1, combo);
    }
  }
  iterar(0, [0,0,0,0]);
  return mejor || [0,0,0,0];
}

// ── Main Update ───────────────────────────────────────────────────────────────
function actualizar() {
  const origen  = document.getElementById('selOrigen').value;
  const destino = document.getElementById('selDestino').value;
  const modo    = document.getElementById('selModo').value;

  const numOrigen  = notaANum(origen);
  const numDestino = notaANum(destino);
  const offset = ((numDestino - numOrigen) % 12 + 12) % 12;

  document.getElementById('semitones').textContent =
    (offset > 6 ? offset - 12 : offset) + (offset === 0 ? '' : '');
  document.getElementById('semitones').textContent = offset === 0 ? '0' :
    (offset > 6 ? `${offset - 12}` : `+${offset}`);

  renderTabla(numOrigen, offset, modo);
  renderDiagramas(numOrigen, offset, modo);
  renderProgresion(numOrigen);
}

// ── Table ─────────────────────────────────────────────────────────────────────
function renderTabla(numOrigen, offset, modo) {
  const tbody = document.getElementById('tbodyAcordes');
  tbody.innerHTML = '';
  const nombres = CFG.notas.nombres_display;

  filas.forEach((fila, idx) => {
    if (!fila.nota) return;
    const numRaiz = notaANum(fila.nota);
    const numTrans = (numRaiz + offset + 12) % 12;
    const grado = calcularGradoSimple(numRaiz, numOrigen);
    const notaTrans = numANota(numTrans, modo);
    const acorde = displayAcorde(fila.nota, fila.calidad);
    const acordeTrans = displayAcorde(notaTrans, fila.calidad);
    const dig = calcularDigitacion(numRaiz, fila.calidad);
    const digTrans = calcularDigitacion(numTrans, fila.calidad);
    const digStr = dig.join('');
    const digTransStr = digTrans.join('');

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${idx + 1}</td>
      <td>${crearSelectNota(idx, fila.nota)}</td>
      <td>${crearSelectCalidad(idx, fila.calidad)}</td>
      <td class="td-chord"><span class="td-chord-link" onclick="mostrarPopup('${fila.nota}','${fila.calidad}')">${acorde}</span></td>
      <td class="td-roman">${grado}</td>
      <td class="td-trans"><span class="td-trans-link" onclick="mostrarPopup('${notaTrans}','${fila.calidad}')">${acordeTrans}</span></td>
      <td class="td-fing">${digStr}</td>
      <td class="td-fing-trans">${digTransStr}</td>
      <td class="td-notes"><input type="text" value="${fila.notas||''}" placeholder="…"
        onchange="filas[${idx}].notas=this.value"></td>
      <td><button class="btn-del" onclick="eliminarFila(${idx})" title="${CFG.ui.eliminar}">×</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function crearSelectNota(idx, valorActual) {
  const opts = CFG.notas.sostenidos.map(n =>
    `<option value="${n}" ${n === valorActual ? 'selected' : ''}>${displayNota(n)}</option>`
  ).join('');
  return `<select onchange="filas[${idx}].nota=this.value;actualizar()">${opts}</select>`;
}

function crearSelectCalidad(idx, valorActual) {
  const opts = Object.entries(CFG.calidades).map(([k,v]) =>
    `<option value="${k}" ${k === valorActual ? 'selected' : ''}>${v.nombre}</option>`
  ).join('');
  return `<select onchange="filas[${idx}].calidad=this.value;actualizar()">${opts}</select>`;
}

function calcularGradoSimple(numRaiz, numOrigen) {
  const semis = ((numRaiz - numOrigen) % 12 + 12) % 12;
  return CFG.grados_romanos[String(semis)]?.mayor || '?';
}

// ── Fret Diagrams ─────────────────────────────────────────────────────────────
function renderDiagramas(numOrigen, offset, modo) {
  renderDiagCol('rowDiagOrig', filas, numOrigen, 0,      modo);
  renderDiagCol('rowDiagTrans', filas, numOrigen, offset, modo);
}

function renderDiagCol(containerId, fs, numOrigen, offset, modo) {
  const cont = document.getElementById(containerId);
  cont.innerHTML = '';
  fs.forEach(fila => {
    if (!fila.nota) return;
    const numRaiz = (notaANum(fila.nota) + offset + 12) % 12;
    const notaNombre = numANota(numRaiz, modo);
    const acorde = displayAcorde(notaNombre, fila.calidad);
    const dig = calcularDigitacion(numRaiz, fila.calidad);
    const card = document.createElement('div');
    card.className = 'diagram-card';
    card.innerHTML = `
      <div class="diagram-name">${acorde}</div>
      ${svgDiagrama(dig)}
      <div class="diagram-fing">${dig.join('')}</div>
    `;
    cont.appendChild(card);
  });
}

function svgDiagrama(dig) {
  // dig order: [B, F#, D, A] → display left-to-right: A D F# B
  // display order: A=dig[3], D=dig[2], F#=dig[1], B=dig[0]
  const displayOrder = [3, 2, 1, 0]; // indices into dig[]
  const strings = CFG.meta.cuerdas_display; // ['A3','D4','F#4','B']

  const W = 110, stringsN = 4, frets = 9;
  const padL = 12, padR = 12, padT = 28, padH = 16;
  const strW = (W - padL - padR) / (stringsN - 1);
  const fretH = 18;
  const H = padT + frets * fretH + padH;

  const displayFrets = displayOrder.map(i => dig[i]);
  const maxFret = Math.max(...displayFrets.filter(f=>f>0), 0);

  let lines = [`<svg class="fret-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`];

  // String labels
  displayOrder.forEach((di, si) => {
    const x = padL + si * strW;
    lines.push(`<text x="${x}" y="15" text-anchor="middle"
      font-family="var(--font-mono)" font-size="10" font-weight="700" fill="var(--text2)">${strings[si]}</text>`);
  });

  // Nut
  lines.push(`<rect x="${padL}" y="${padT}" width="${W-padL-padR}" height="3" fill="var(--text2)"/>`);

  // Fret lines
  for (let f = 1; f <= frets; f++) {
    const y = padT + f * fretH;
    lines.push(`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}"
      stroke="var(--border)" stroke-width="1"/>`);
  }

  // String lines
  for (let s = 0; s < stringsN; s++) {
    const x = padL + s * strW;
    lines.push(`<line x1="${x}" y1="${padT}" x2="${x}" y2="${padT + frets * fretH}"
      stroke="var(--text2)" stroke-width="1.5"/>`);
  }

  // Markers
  displayFrets.forEach((f, si) => {
    const x = padL + si * strW;
    if (f === 0) {
      // Open circle above nut
      lines.push(`<circle cx="${x}" cy="${padT - 7}" r="5"
        fill="none" stroke="var(--text)" stroke-width="2"/>`);
    } else {
      const y = padT + (f - 0.5) * fretH;
      lines.push(`<circle cx="${x}" cy="${y}" r="8" fill="var(--accent)"/>`);
      lines.push(`<text x="${x}" y="${y+4}" text-anchor="middle"
        font-family="var(--font-mono)" font-size="10" font-weight="700" fill="white">${f}</text>`);
    }
  });

  lines.push('</svg>');
  return lines.join('\n');
}

// ── Progression ───────────────────────────────────────────────────────────────
function renderProgresion(numOrigen) {
  const grados = filas
    .filter(f => f.nota)
    .map(f => calcularGradoSimple(notaANum(f.nota), numOrigen));

  document.getElementById('gradosDisplay').textContent =
    grados.length ? grados.join(' — ') : '—';

  const patron = grados.join('-');
  const match = CFG.progresiones.find(p => {
    // Try matching any rotation
    const pg = p.patron.split('-');
    for (let r = 0; r < grados.length; r++) {
      const rotated = grados.slice(r).concat(grados.slice(0,r));
      if (rotated.join('-') === pg.join('-')) return true;
    }
    return patron.includes(p.patron) || p.patron.includes(patron);
  });

  const matchEl = document.getElementById('progMatch');
  const ui = CFG.ui;
  if (match) {
    matchEl.innerHTML = `<div class="prog-match-name">✓ ${match.nombre} <em style="font-style:normal;opacity:0.7">(${match.patron})</em></div>`;
  } else if (grados.length >= 2) {
    matchEl.innerHTML = `<div class="prog-none">${ui.sin_progresion}</div>`;
  } else {
    matchEl.innerHTML = '';
  }
}

}

  escala = escala === 'mayor' ? 'menor' : 'mayor';
  const btn = document.getElementById('btnEscala');
  btn.textContent = escala === 'mayor' ? 'M' : 'm';
  btn.classList.toggle('menor', escala === 'menor');
  if (ultimaProgresion) aplicarProgresion(ultimaProgresion);
}

function construirSelProgresion() {
  const sel = document.getElementById('selProgresion');
  while (sel.options.length > 1) sel.remove(1);
  CFG.progresiones.forEach(p => {
    const o = document.createElement('option');
    o.value = p.patron;
    o.textContent = `${p.nombre}  (${p.patron})`;
    sel.appendChild(o);
  });
}

function aplicarProgresion(patron) {
  if (!patron) return;
  ultimaProgresion = patron;
  const map = escala === 'menor' ? DEGREE_MAP_MENOR : DEGREE_MAP;
  const origen = document.getElementById('selOrigen').value;
  const modo   = document.getElementById('selModo').value;
  const numOrigen = notaANum(origen);
  filas = patron.split('-').map(g => {
    const entry = map[g];
    if (!entry) return { nota: 'C', calidad: 'maj', notas: '' };
    const numNota = (numOrigen + entry.semi + 12) % 12;
    return { nota: numANota(numNota, modo), calidad: entry.calidad, notas: '' };
  });
  actualizar();
}

// ── All Qualities Popup ────────────────────────────────────────────────────────
function construirSelAcordeRef() {
  const sel = document.getElementById('selAcordeRef');
  // remove any previously built options (keep placeholder)
  while (sel.options.length > 1) sel.remove(1);
  CFG.notas.sostenidos.forEach(n => {
    const o = document.createElement('option');
    o.value = n;
    o.textContent = displayNota(n);
    sel.appendChild(o);
  });
}

function mostrarTodosAcordes(nota) {
  if (!nota) return;
  const numRaiz = notaANum(nota);
  document.getElementById('modalAllTitulo').textContent = displayNota(nota);
  const grid = document.getElementById('modalAllGrid');
  grid.innerHTML = '';
  Object.entries(CFG.calidades).forEach(([key, cal]) => {
    const dig = calcularDigitacion(numRaiz, key);
    const card = document.createElement('div');
    card.className = 'diagram-card';
    card.innerHTML = `
      <div class="diagram-name">${displayAcorde(nota, key)}</div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">${cal.nombre}</div>
      ${svgDiagrama(dig)}
      <div class="diagram-fing">${dig.join('')}</div>
    `;
    grid.appendChild(card);
  });
  document.getElementById('modalAllOverlay').classList.add('open');
}

function cerrarPopupAll(e) {
  if (e && e.target !== document.getElementById('modalAllOverlay')) return;
  document.getElementById('modalAllOverlay').classList.remove('open');
}

// ── Chord Popup ───────────────────────────────────────────────────────────────
function mostrarPopup(nota, calidad) {
  const numRaiz = notaANum(nota);
  const dig = calcularDigitacion(numRaiz, calidad);
  document.getElementById('modalNombre').textContent = displayAcorde(nota, calidad);
  document.getElementById('modalDiagrama').innerHTML = svgDiagrama(dig);
  document.getElementById('modalFing').textContent = dig.join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function cerrarPopup(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
}

// ── Notation ──────────────────────────────────────────────────────────────────
function toggleNotacion() {
  notacion = notacion === 'latin' ? 'english' : 'latin';
  document.getElementById('btnNotacionLabel').textContent =
    notacion === 'latin' ? 'C D E' : 'Do Re Mi';
  refrescarSelectsNota();
  construirSelAcordeRef();
  actualizar();
}

// ── Theme ─────────────────────────────────────────────────────────────────────
function toggleTema() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('iconSol').style.display  = dark ? '' : 'none';
  document.getElementById('iconLuna').style.display = dark ? 'none' : '';
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// Los datos están incrustados directamente — no se necesita servidor.
// Para editarlos, busca la constante DATOS_ACORDES al inicio del script.
CFG = DATOS_ACORDES;
init();
</script>
</body>
</html>
